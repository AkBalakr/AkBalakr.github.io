<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="preload" as="image" href="AK1.webp" type="image/webp">
    <meta name="description" content="Akash Balakrishnan - Software developer portfolio. Projects in AI, full-stack, and systems programming.">
    <meta property="og:title" content="Akash Balakrishnan">
    <meta property="og:description" content="Explore my projects and experience">

    <meta property="og:url" content="https://akashbalakrish.com/">
    <link rel="icon" href="AK1.webp" type="image/webp">


    
</head>
<body>
    <div id="header-placeholder"></div>
    <script>
      fetch('components/header.html')
        .then(response => response.text())
        .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
        // Mobile menu toggle
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.getElementById('primary-nav');
        if (toggle && nav) {
          toggle.addEventListener('click', (e) => {
            const isOpen = nav.classList.toggle('open');
            toggle.setAttribute('aria-expanded', String(isOpen));
            toggle.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
            e.stopPropagation();
          });
          document.addEventListener('click', (e) => {
            if (!nav.contains(e.target) && e.target !== toggle && nav.classList.contains('open')) {
              nav.classList.remove('open');
              toggle.setAttribute('aria-expanded', 'false');
              toggle.setAttribute('aria-label', 'Open menu');
            }
          });
        }
        });
    </script>
 
    
    <section class="hero">
        <div class="hero-text">
            <h1>I am Akash Balakrishnan <br> </h1>

            </a>
            <div class="resume">
            <a href="Akash_Resume.pdf" target="_blank" class="resume-button">View My Resume</a>
            </div>

            </a> 
        </div>-->
        
        
    </div>

    </section>
</body>
</html>
