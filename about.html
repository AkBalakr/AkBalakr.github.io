<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akash Balakrishnan</title>
    <link rel="stylesheet" href="style.css">

    
</head>
<body>
    <div id="header-placeholder"></div>
    <script>
      fetch('components/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('header-placeholder').innerHTML = html;
          const toggle = document.querySelector('.menu-toggle');
          const nav = document.getElementById('primary-nav');
          if (toggle && nav) {
            toggle.addEventListener('click', (e) => {
              const isOpen = nav.classList.toggle('open');
              toggle.setAttribute('aria-expanded', String(isOpen));
              toggle.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
              e.stopPropagation();
            });
            document.addEventListener('click', (e) => {
              if (!nav.contains(e.target) && e.target !== toggle && nav.classList.contains('open')) {
                nav.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
                toggle.setAttribute('aria-label', 'Open menu');
              }
            });
          }
        });
    </script>
    <section class="hero">
        <div class="hero-text">
            <h1>I am Akash Balakrishnan <br> </h1>
            <p>work in progress</p>
          <!-- Add Resume Download Section -->
          
    </div>
    <img class="hero-image" src="AK1.webp" alt="Portrait of Akash Balakrishnan" width="400" height="400" loading="lazy">
    </section>
</body>
</html>
